<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NAVA Studio Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; padding:40px; }
    .wrap { max-width: 1100px; margin: 0 auto; text-align: center; }
    .login { max-width: 420px; margin: 120px auto; background:#161a22; padding:24px; border-radius:12px; text-align:center; }
    button, input { padding:10px 12px; border-radius:8px; border:none; }
    button { cursor:pointer; background:#7aa2ff; color:#0f1115; font-weight:bold; }
    input { background:#0f1115; color:#e6e6e6; border:1px solid #2a2f3a; margin-right:8px; width:180px; }
    .card { background:#161a22; padding:24px; border-radius:16px; margin-bottom:28px; text-align: left; }
    h2, h3 { margin-top: 0; }
    .grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
      gap:18px; 
    }
    .grid img {
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      width:100%;
      border-radius:10px;
    }
    .grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .meta { color:#9aa4b2; font-size:14px; margin-bottom: 16px; }
    .section-title { 
      font-size: 24px; 
      margin-bottom: 8px; 
      color: #7aa2ff;
    }
    .project-name {
      font-size: 28px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }
    hr {
      border-color: #2a2f3a;
      margin: 24px 0;
    }
    /* Стрелки навигации */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 16px 24px;
      cursor: pointer;
      z-index: 10000;
      user-select: none;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .nav-arrow:hover {
      background: rgba(0,0,0,0.8);
    }
    .nav-left {
      left: 20px;
    }
    .nav-right {
      right: 20px;
    }
    .image-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 10000;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div id="login" class="login">
  <h2>NAVA Studio Portfolio</h2>
  <p>Private NDA-safe portfolio — for Wargaming viewing only</p>
  <input type="password" id="pw" placeholder="Password" />
  <button onclick="checkPw()">Enter</button>
</div>

<div id="content" class="wrap" style="display:none;">
  
  <div class="card">
    <div class="section-title">Skin</div>
    
    <!-- Проект Binah -->
    <div class="project-name">Binah</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="1.gif" alt="Binah skin preview 1" data-project="binah" data-index="0" onclick="openLightbox(this.src, 'binah', 0)">
      <img src="2.gif" alt="Binah skin preview 2" data-project="binah" data-index="1" onclick="openLightbox(this.src, 'binah', 1)">
      <img src="3.gif" alt="Binah skin preview 3" data-project="binah" data-index="2" onclick="openLightbox(this.src, 'binah', 2)">
    </div>

    <hr>

    <!-- Проект Corona -->
    <div class="project-name">Corona</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="4.gif" alt="Corona skin preview 1" data-project="corona" data-index="0" onclick="openLightbox(this.src, 'corona', 0)">
      <img src="5.gif" alt="Corona skin preview 2" data-project="corona" data-index="1" onclick="openLightbox(this.src, 'corona', 1)">
      <img src="6.gif" alt="Corona skin preview 3" data-project="corona" data-index="2" onclick="openLightbox(this.src, 'corona', 2)">
    </div>

    <hr>

    <!-- Проект Corals -->
    <div class="project-name">Corals</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="7.gif" alt="Corals skin preview 1" data-project="corals" data-index="0" onclick="openLightbox(this.src, 'corals', 0)">
      <img src="8.gif" alt="Corals skin preview 2" data-project="corals" data-index="1" onclick="openLightbox(this.src, 'corals', 1)">
      <img src="9.gif" alt="Corals skin preview 3" data-project="corals" data-index="2" onclick="openLightbox(this.src, 'corals', 2)">
    </div>
  </div>

</div>

<script>
  const correctPw = "WG0070707";

  // База данных изображений по проектам
  const projectImages = {
    binah: ["1.gif", "2.gif", "3.gif"],
    corona: ["4.gif", "5.gif", "6.gif"],
    corals: ["7.gif", "8.gif", "9.gif"]
  };

  let currentProject = null;
  let currentIndex = 0;

  function openLightbox(src, project, index) {
    currentProject = project;
    currentIndex = index;
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = src;
    lb.style.display = "flex";
    updateCounter();
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
    currentProject = null;
  }

  function nextImage() {
    if (!currentProject) return;
    const images = projectImages[currentProject];
    if (images.length === 0) return;
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("lightbox-img").src = images[currentIndex];
    updateCounter();
  }

  function prevImage() {
    if (!currentProject) return;
    const images = projectImages[currentProject];
    if (images.length === 0) return;
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("lightbox-img").src = images[currentIndex];
    updateCounter();
  }

  function updateCounter() {
    const counter = document.getElementById("image-counter");
    if (counter && currentProject) {
      const images = projectImages[currentProject];
      counter.textContent = `${currentIndex + 1} / ${images.length}`;
    }
  }

  function checkPw() {
    const input = document.getElementById("pw").value;
    if (input === correctPw) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    } else {
      alert("Incorrect password");
    }
  }

  // Обработка клавиш клавиатуры
  document.addEventListener("keydown", function(e) {
    const lb = document.getElementById("lightbox");
    if (lb.style.display === "flex") {
      if (e.key === "ArrowLeft") {
        prevImage();
        e.preventDefault();
      } else if (e.key === "ArrowRight") {
        nextImage();
        e.preventDefault();
      } else if (e.key === "Escape") {
        closeLightbox();
        e.preventDefault();
      }
    }
  });
</script>

<!-- Lightbox с навигацией -->
<div id="lightbox" onclick="closeLightbox()" style="
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
">
  <!-- Стрелка влево -->
  <div class="nav-arrow nav-left" onclick="event.stopPropagation(); prevImage();">◀</div>
  
  <!-- Изображение -->
  <img id="lightbox-img" src="" alt="" style="
    max-width: 85vw;
    max-height: 85vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    cursor: default;
  " onclick="event.stopPropagation();">
  
  <!-- Стрелка вправо -->
  <div class="nav-arrow nav-right" onclick="event.stopPropagation(); nextImage();">►</div>
  
  <!-- Счётчик изображений -->
  <div id="image-counter" class="image-counter"></div>
</div>

</body>
</html>
